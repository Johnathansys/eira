<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style_redesigned.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Dashboard - Eira</title>
</head>
<body class="dashboard-page">
    <!-- TOP BAR -->
    <div class="dashboard-topbar">
        <div class="dashboard-logo-section">
            <img src="/static/eiralogo.png" alt="Eira Logo" class="dashboard-logo">
            <span class="dashboard-logo-text">EIRA</span>
        </div>
        <div class="dashboard-nav">
            <a href="#contact" class="nav-link">Contacts</a>
            <a href="/logout" class="nav-link">Sign Out</a>
        </div>
    </div>

    <div class="dashboard-content">
        <!-- MAIN AREA: Welcome + Chart -->
        <div class="dashboard-main">
            <div class="dashboard-welcome">
                <h1>Hello, {{ username }}</h1>
                <p class="welcome-subtitle">How are you feeling today?</p>
            </div>

            <!-- Mood Chart -->
            <div class="mood-chart-container">
                <h3 class="chart-title">📈 Your mood over time</h3>
                <canvas id="moodChart"></canvas>
            </div>
        </div>

        <!-- SIDEBAR: Quick Actions -->
        <aside class="dashboard-sidebar">
            <h2 class="sidebar-title">Quick Actions</h2>
            
            <a href="/journal_entry" class="quick-action-btn">
                New Journal Entry
            </a>
            
            <a href="/history" class="quick-action-btn">
                Journal History
            </a>
            
            <a href="/calendar" class="quick-action-btn">
                Calendar View
            </a>
            
            <a href="/ai_assistant" class="quick-action-btn">
                AI Assistant
            </a>
            
            <a href="/delete-account" class="quick-action-btn">
                Account Settings
            </a>

            <!-- Current Mood Display -->
            <div class="current-mood-box">
                <p class="mood-label">Your Current Mood:</p>
                <p class="mood-value">9/10</p>
            </div>
        </aside>
    </div>

    <!-- Chart.js Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('moodChart').getContext('2d');
            
            // Sample data (replace with real data from backend)
            const dates = {{ recent_dates | tojson | safe }};
            const moods = {{ recent_moods | tojson | safe }};
            
            const moodChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.reverse(),
                    datasets: [{
                        label: 'Mood Rating',
                        data: moods.reverse(),
                        borderColor: '#7B68EE',
                        backgroundColor: 'rgba(123, 104, 238, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 0,
                            max: 10,
                            ticks: { 
                                stepSize: 2,
                                color: '#333'
                            },
                            grid: {
                                color: '#E5E5E5'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#666',
                                maxRotation: 45,
                                minRotation: 45
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
