<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style_redesigned.css">
    <title>New Journal Entry - Eira</title>
</head>
<body class="journal-entry-page">
    <!-- TOP ACTION BAR -->
    <div class="journal-topbar">
        <a href="/dashboard" class="btn-back">Back</a>
        <div class="journal-actions">
            <a href="/dashboard" class="btn-cancel">Cancel</a>
            <button type="submit" form="journalForm" class="btn-save">Save</button>
        </div>
    </div>

    <!-- JOURNAL FORM -->
    <div class="journal-container">
        <h1 class="journal-title">New Journal Entry</h1>
        <p class="journal-subtitle">Take a moment to reflect on your day.</p>

        <form method="POST" action="/journal_entry" id="journalForm">
            <!-- Title Input -->
            <div class="form-section">
                <label class="form-label">Title</label>
                <input type="text" name="title" placeholder="Give your entry a title..." required class="journal-input-title">
            </div>

            <!-- How does this story feel? -->
            <div class="form-section">
                <label class="form-label">How does this story feel?</label>
                <div class="mood-pills-container">
                    <button type="button" class="mood-pill" data-mood="excited">😁 Excited</button>
                    <button type="button" class="mood-pill" data-mood="good">😊 Good</button>
                    <button type="button" class="mood-pill" data-mood="neutral">😐 Neutral</button>
                    <button type="button" class="mood-pill" data-mood="bad">😔 Bad</button>
                    <button type="button" class="mood-pill" data-mood="tired">😴 Tired</button>
                </div>
                <input type="hidden" name="mood" id="mood-input">
            </div>

            <!-- What is this entry mostly about? -->
            <div class="form-section">
                <label class="form-label">What is this entry mostly about?</label>
                <div class="topic-pills-container">
                    <button type="button" class="topic-pill">School</button>
                    <button type="button" class="topic-pill">Family</button>
                    <button type="button" class="topic-pill">Wins</button>
                    <button type="button" class="topic-pill">Goals</button>
                    <button type="button" class="topic-pill">Friends</button>
                    <button type="button" class="topic-pill">Health</button>
                    <button type="button" class="topic-pill">Struggles</button>
                    <button type="button" class="topic-pill">Random</button>
                </div>
            </div>

            <!-- Mood Rating Slider -->
            <div class="form-section">
                <label class="form-label">How are you feeling? <span id="mood-rating-display">5</span>/10</label>
                <input type="range" name="mood_rating" id="mood-rating-slider" min="1" max="10" step="0.5" value="5" class="mood-slider">
            </div>

            <!-- Content Textarea -->
            <div class="form-section">
                <label class="form-label">What's on your mind?</label>
                <textarea name="content" rows="12" placeholder="Start writing..." required class="journal-textarea"></textarea>
            </div>
        </form>
    </div>

    <script>
        // Mood pill selection
        const moodPills = document.querySelectorAll('.mood-pill');
        const moodInput = document.getElementById('mood-input');

        moodPills.forEach(pill => {
            pill.addEventListener('click', function() {
                moodPills.forEach(p => p.classList.remove('selected'));
                this.classList.add('selected');
                moodInput.value = this.dataset.mood;
            });
        });

        // Topic pill toggle (multiple selection)
        const topicPills = document.querySelectorAll('.topic-pill');
        topicPills.forEach(pill => {
            pill.addEventListener('click', function() {
                this.classList.toggle('selected');
            });
        });

        // Mood rating slider display
        const moodSlider = document.getElementById('mood-rating-slider');
        const moodDisplay = document.getElementById('mood-rating-display');

        moodSlider.addEventListener('input', function() {
            moodDisplay.textContent = this.value;
        });
    </script>
</body>
</html>
