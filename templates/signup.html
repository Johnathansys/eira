<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style_redesigned.css">
    <title>Sign Up - Eira</title>
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- LEFT SIDE: Branding -->
        <div class="auth-left">
            <div class="auth-branding">
                <h2 class="auth-welcome">Welcome to Eira!</h2>
                <p class="auth-tagline">A website to use to journal your<br><span class="highlight-text">personal growth</span></p>
                
                <div class="auth-logo-box">
                    <img src="/static/eiralogo.png" alt="Eira Logo" class="auth-logo">
                    <div class="auth-logo-text">EIRA</div>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: Signup Form -->
        <div class="auth-right">
            <div class="auth-form-container">
                <h1 class="form-title">Create Account</h1>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="/signup" class="auth-form">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="Name" required minlength="3" maxlength="20" class="form-input">
                    </div>

                    <div class="form-group">
                        <input type="email" name="email" placeholder="Email" class="form-input">
                    </div>

                    <div class="form-group">
                        <input type="password" name="password" placeholder="Password" required minlength="8" class="form-input">
                    </div>

                    <div class="form-group">
                        <input type="password" name="confirm_password" placeholder="Confirm Password" required minlength="8" class="form-input">
                    </div>

                    <button type="submit" class="btn-submit">Create Account</button>
                </form>

                <p class="form-footer">
                    Already have an account? <a href="/login" class="form-link">Login</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
