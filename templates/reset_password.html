<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Eira - Reset Password</title>
</head>
<body>
    <header>
        <img src="/static/eiralogo.png" alt="Eira Logo" class="logo">
        <nav class="navbar">
            <h1 class="nav-left">Eira!</h1>
            <div>
                <a href="/">Home</a>
                <a href="/login">Login</a>
            </div>
        </nav>
    </header>

    <div class="main-content">
        <div class="container">
            <form method="POST" action="/reset-password/{{ token }}">
                <h1>Set New Password</h1>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <input type="password" name="new_password" placeholder="New Password (min 8 characters)" required minlength="8">
                <input type="password" name="confirm_password" placeholder="Confirm New Password" required minlength="8">
                <input type="submit" value="Reset Password" class="btn">
            </form>

            <a href="/login">Back to Login</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Eira - Mental Health Companion</p>
    </footer>
</body>
</html>
